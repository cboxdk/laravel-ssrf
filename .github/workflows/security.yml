name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, so advisories that land after a release are still surfaced.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  # Dependency vulnerability scan — a second source alongside `composer audit`.
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --no-progress
      - name: composer audit
        run: composer audit --no-dev
      - name: OSV-Scanner (composer.lock)
        uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --lockfile=composer.lock

  # Secret scanning — a leaked key is the worst failure mode for an auth library.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Static application security testing (SAST). Findings are uploaded to the
  # repository Security tab as SARIF rather than failing the build, so triage
  # happens in code review.
  sast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: semgrep scan
        run: semgrep scan --config=p/php --config=p/security-audit --config=p/secrets --sarif --output=semgrep.sarif
        continue-on-error: true
      - name: upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()
