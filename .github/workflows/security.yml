name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, so advisories that land after a release are still surfaced.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  # Dependency vulnerability scan against the PHP Security Advisories database.
  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --no-progress
      - name: composer audit
        run: composer audit --no-dev

  # Secret scanning — a leaked key is the worst failure mode for a security lib.
  # TruffleHog's action is free for organizations (gitleaks-action is not).
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # Static application security testing. Findings are uploaded to the Security tab
  # as SARIF rather than failing the build, so triage happens in review.
  sast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7
      - name: semgrep scan
        run: semgrep scan --config=p/php --config=p/security-audit --config=p/secrets --sarif --output=semgrep.sarif
        continue-on-error: true
      - name: upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()
